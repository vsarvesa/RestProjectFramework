# ============================================================
# REST Assured Framework Configuration
# ============================================================
# All values here can be overridden by system properties:
#   mvn test -Dbase.url=https://other-server.com
# ============================================================

# ----------------------------------------------------------
# API Base URL
# ----------------------------------------------------------
base.url=https://api.example.com

# ----------------------------------------------------------
# OAuth 2.0 — Token Endpoint
# ----------------------------------------------------------
auth.url=https://auth.example.com/oauth/token

# OAuth 2.0 client credentials grant
client.id=your_client_id
client.secret=your_client_secret

# OAuth 2.0 password grant (optional — leave blank if not used)
auth.username=your_username
auth.password=your_password

# Grant type: client_credentials | password
# Use "client_credentials" for machine-to-machine
# Use "password" for user-level token
auth.grant.type=client_credentials

# OAuth scope (optional — leave blank if not required)
auth.scope=

# ----------------------------------------------------------
# HTTP Client Settings
# ----------------------------------------------------------
# Connection timeout in milliseconds
http.connect.timeout=10000

# Read timeout in milliseconds
http.read.timeout=30000

# ----------------------------------------------------------
# Retry Configuration
# ----------------------------------------------------------
# Number of times to retry on failure (429, 500, 502, 503, 504)
retry.max.count=3

# Backoff delay between retries in milliseconds (doubles each retry)
retry.initial.delay.ms=1000

# ----------------------------------------------------------
# Microsoft SQL Server (MSSQL) Configuration
# ----------------------------------------------------------
mssql.url=jdbc:sqlserver://localhost:1433;databaseName=TestDB;encrypt=true;trustServerCertificate=true
mssql.username=sa
mssql.password=YourMSSQLPassword
mssql.pool.min-idle=2
mssql.pool.max-pool-size=10
mssql.pool.connection-timeout=30000

# ----------------------------------------------------------
# Oracle Database Configuration
# ----------------------------------------------------------
oracle.url=jdbc:oracle:thin:@//localhost:1521/ORCLPDB1
oracle.username=system
oracle.password=YourOraclePassword
oracle.pool.min-idle=2
oracle.pool.max-pool-size=10
oracle.pool.connection-timeout=30000

# ----------------------------------------------------------
# Allure Reporting
# ----------------------------------------------------------
allure.results.directory=target/allure-results
